[project]
name = "tested-infrastructure"
authors = ["Web3 Infrastructure Team"]
description = "A robust Clarity contract for generating and managing unique infrastructure tokens"
telemetry = false
requirements = []
[contracts.infrastructure-generator]
path = "contracts/infrastructure-generator.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
